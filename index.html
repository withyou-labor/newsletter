<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노무법인 위드유 법원지사 뉴스레터</title>

<style>
body {
  margin:0;
  font-family:'Noto Sans KR',sans-serif;
  background:#f5f7fb;
}

/* 헤더 */
.header {
  text-align:center;
  padding:30px 15px;
  background:white;
}

.header img {
  width:90px;
}

.firm {
  font-weight:700;
  margin-top:10px;
  color:#0f3470;
}

.title {
  font-size:32px;
  font-weight:800;
  color:#0f3470;
  margin-top:15px;
}

.sub {
  color:#666;
  margin-top:5px;
}

.date {
  margin-top:10px;
  color:#444;
}

/* 카테고리 */
.category {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.category button {
  height:50px;
  border-radius:10px;
  border:1px solid #cfd8e3;
  background:white;
  font-weight:600;
}

.category .active {
  background:#0f3470;
  color:white;
}

/* 카드 */
.card {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  position:relative;
}

.tag {
  display:inline-block;
  background:#eef3ff;
  color:#2453c3;
  padding:4px 10px;
  border-radius:20px;
  font-size:13px;
  margin-bottom:8px;
}

.card h3 {
  margin:0;
  font-size:18px;
}

.card p {
  font-size:14px;
  color:#555;
}

.source {
  font-size:12px;
  color:#888;
  margin-top:5px;
}

/* 원문보기 버튼 */
.btn {
  position:absolute;
  right:15px;
  bottom:15px;
  border:1px solid #cfd8e3;
  padding:6px 10px;
  border-radius:8px;
  font-size:13px;
}

/* 안내 */
.notice {
  background:#eef3fb;
  padding:12px;
  margin:10px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
}

/* 하단 */
.footer {
  background:#0f3470;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.footer-left {
  font-size:14px;
}

.footer-left div {
  margin-bottom:5px;
}

/* 전화 박스 (오른쪽 작은 박스) */
.tel-box {
  background:#c69a4b;
  padding:15px 20px;
  border-radius:12px;
  font-weight:700;
  font-size:16px;
}

.tel-box a {
  color:white;
  text-decoration:none; /* 밑줄 제거 */
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div class="firm">노무법인 위드유 법원지사</div>
  <div class="title">주간 노동법 뉴스레터</div>
  <div class="sub">주요 노동 이슈와 판례, 정책 동향을 정리해드립니다.</div>
  <div class="date">📅 2026.04.23 (목)</div>
</div>

<div class="category">
  <button class="active">전체</button>
  <button>판례·행정해석</button>
  <button>노동정책·입법</button>
  <button>집단적노사관계</button>
  <button>산재·안전</button>
  <button>부당해고·징계</button>
  <button>직장내괴롭힘</button>
  <button>임금·근로시간</button>
</div>

<div class="card">
  <span class="tag">노동정책·입법</span>
  <h3>2026년 최저임금 시간당 10,030원 확정</h3>
  <p>2026년도 최저임금이 시간당 10,030원으로 결정되었습니다.</p>
  <div class="source">출처: 고용노동부</div>
  <a class="btn" href="#">원문보기</a>
</div>

<div class="notice">
복잡한 노동문제 노무법인 위드유 법원지사와 함께 하세요
</div>

<div class="footer">

  <div class="footer-left">
    <div>노무법인 위드유 법원지사</div>
    <div>전화 051-505-5128</div>
    <div>팩스 051-505-5127</div>
    <div>블로그 blog.naver.com/hocpla5128</div>
  </div>

  <div class="tel-box">
    <a href="tel:0515055128">
      📞 전화 상담 바로 연결<br>
      051-505-5128
    </a>
  </div>

</div>

</body>
</html>
