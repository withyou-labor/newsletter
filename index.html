/* 상단 */
.header {

.title {

.card h3 {
  margin:0;
  font-size:18px;
}

.card p {
  color:#555;
  font-size:14px;
}

.btn {
  float:right;
  border:1px solid #cfd8e3;
  padding:6px 10px;
  border-radius:8px;
}

/* 안내 */
.notice {
  background:#eef3fb;
  padding:12px;
  margin:10px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
}

/* 하단 */
.footer {
  background:#0f3470;
  color:white;
  padding:20px;
}

.tel-btn {
  display:block;
  background:#c69a4b;
  color:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:18px;
  font-weight:700;

</style>
